name: Build reF1nd-dev sing-box core

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'sing-box source (tag/branch/commit)'
        type: string
        required: false
        default: 'reF1nd-dev'
      build_version:
        description: 'Version string to embed (constant.Version) [required]'
        type: string
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Prepare context
        id: prep
        run: |
          UPSTREAM_REPO="https://github.com/reF1nd/sing-box.git"
          REF="${{ github.event.inputs.version }}"
          VERSION="${{ github.event.inputs.build_version }}"

          echo "REF=$REF" >> $GITHUB_ENV
          echo "UPSTREAM_REPO=$UPSTREAM_REPO" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "upstream=$UPSTREAM_REPO" >> $GITHUB_OUTPUT

      - name: Resolve SHA (tag/branch/commit)
        id: upstream
        run: |
          set -e
          SHA=$(git ls-remote --heads "${UPSTREAM_REPO}" "refs/heads/${REF}" | cut -f1)
          if [ -z "$SHA" ]; then
            SHA=$(git ls-remote --tags "${UPSTREAM_REPO}" "${REF}^{}" | cut -f1)
          fi
          if [ -z "$SHA" ]; then
            SHA=$(git ls-remote "${UPSTREAM_REPO}" "${REF}" | cut -f1)
          fi
          if [ -z "$SHA" ]; then
            echo "ERROR: REF '${REF}' not found (branch/tag/commit)."
            exit 1
          fi
          SHORT="${SHA:0:7}"
          echo "UPSTREAM_SHA=$SHA" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT" >> $GITHUB_ENV
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "short=$SHORT" >> $GITHUB_OUTPUT

      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: reF1nd/sing-box
          ref: ${{ steps.upstream.outputs.sha }}
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Define build metadata
        id: meta
        run: |
          set -xeuo pipefail
          TAGS="with_gvisor with_quic with_dhcp with_grpc with_utls with_clash_api badlinkname"
          OUT="sing-box-${VERSION}-linux-arm64"

          echo "TAGS=$TAGS" >> $GITHUB_ENV
          echo "OUT=$OUT" >> $GITHUB_ENV

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "out=$OUT" >> $GITHUB_OUTPUT

      - name: Build sing-box (linux arm64)
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: arm64
        run: |
          set -xeuo pipefail
          go build \
            -trimpath \
            -o "${OUT}" \
            -ldflags="-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' -s -w -buildid= -checklinkname=0" \
            -tags="${TAGS}" \
            ./cmd/sing-box

      - name: Verify arch
        run: file "${OUT}"

      - name: Prepare executable file
        run: |
          # 确保最终文件权限正确
          chmod +x "${OUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-linux-arm64-${{ steps.upstream.outputs.short }}
          path: |
            ${{ steps.meta.outputs.out }}
